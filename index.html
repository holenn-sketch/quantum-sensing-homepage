<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="量子传感与非厄米传感研究主页，收纳论文、数据集与复现实验资源。"
    />
    <title>Quantum Sensing Archive</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-home">
    <header class="site-header" data-header>
      <a class="brand" href="./index.html#top" aria-label="返回首页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Q Sense Archive</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a class="is-current" href="./index.html#papers">论文</a>
        <a href="./data.html#datasets">数据</a>
        <a href="./data.html#flow">脉络</a>
      </nav>
      <button class="icon-button" type="button" data-theme-toggle aria-label="切换明暗外观">
        <span aria-hidden="true">◐</span>
      </button>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <canvas class="field-canvas" data-field-canvas aria-hidden="true"></canvas>
        <div class="hero-content">
          <p class="eyebrow">Quantum Sensing · Non-Hermitian Sensing</p>
          <h1 id="hero-title" class="sr-only">Quantum sensing publications</h1>
          <div class="liquid-current" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="hero-actions" aria-label="快速入口">
            <a class="text-link text-link-strong" href="#papers">浏览论文</a>
            <a class="text-link" href="./data.html#datasets">数据与流程</a>
          </div>
        </div>
        <div class="hero-strip" aria-label="研究概览">
          <div>
            <span data-paper-count>0</span>
            <small>papers</small>
          </div>
          <div>
            <span data-dataset-count>0</span>
            <small>datasets</small>
          </div>
          <div>
            <span>EP</span>
            <small>exceptional point</small>
          </div>
        </div>
      </section>

      <section class="section section-quiet" id="papers" aria-labelledby="papers-title">
        <div class="section-head reveal">
          <p class="eyebrow">Selected Works</p>
          <h2 id="papers-title">论文</h2>
          <p>
            面向非厄米传感的简化、高阶化与稳定性分析，保留 DOI、PDF 与代码入口。
          </p>
        </div>

        <div class="toolbar reveal" aria-label="论文筛选">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input data-search type="search" placeholder="检索标题、年份、标签" />
          </label>
          <div class="segmented" data-filter-group aria-label="主题">
            <button type="button" class="is-active" data-filter="all">全部</button>
            <button type="button" data-filter="first-author">第一作者</button>
            <button type="button" data-filter="non-hermitian">非厄米</button>
            <button type="button" data-filter="higher-order">高阶</button>
            <button type="button" data-filter="quantum">量子传感</button>
          </div>
        </div>

        <div class="resource-grid" data-paper-grid></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Quantum Sensing Archive · 2026</p>
      <a href="./data.html#datasets">数据与流程</a>
    </footer>

    <noscript>
      <p class="noscript">此主页需要启用 JavaScript 来渲染论文和数据列表。</p>
    </noscript>
    <script src="./script.js"></script>
  </body>
</html>
