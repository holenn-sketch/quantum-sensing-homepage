<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="量子传感与非厄米传感论文成果，包含 DOI、主题标签、中文标题与第一作者标记。"
    />
    <title>Papers · Quantum Sensing Archive</title>
    <link rel="icon" href="./favicon.svg?v=2" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-papers">
    <header class="site-header" data-header>
      <a class="brand" href="./index.html#top" aria-label="返回首页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Q Sense Archive</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a class="is-current" href="./papers.html">论文成果</a>
        <a href="./data.html">数据资源</a>
        <a href="./related.html">相关论文</a>
        <a href="./flow.html">研究脉络</a>
      </nav>
      <button class="icon-button" type="button" data-theme-toggle aria-label="切换明暗外观">
        <span aria-hidden="true">◐</span>
      </button>
    </header>

    <main id="top">
      <section class="hero subpage-hero" aria-labelledby="papers-hero-title">
        <canvas class="field-canvas" data-field-canvas aria-hidden="true"></canvas>
        <div class="hero-content">
          <p class="eyebrow">Selected Works</p>
          <h1 id="papers-hero-title">Papers</h1>
          <div class="hero-actions" aria-label="页面入口">
            <a class="text-link text-link-strong" href="#papers">浏览成果</a>
            <a class="text-link" href="./related.html">相关论文</a>
            <a class="text-link" href="./flow.html">研究脉络</a>
          </div>
        </div>
        <div class="hero-strip" aria-label="论文概览">
          <div>
            <span data-paper-count>0</span>
            <small>papers</small>
          </div>
          <div>
            <span>DOI</span>
            <small>recorded</small>
          </div>
          <div>
            <span>EP</span>
            <small>exceptional point</small>
          </div>
        </div>
      </section>

      <section class="section section-quiet" id="papers" aria-labelledby="papers-title">
        <div class="section-head reveal">
          <p class="eyebrow">Research Outputs</p>
          <h2 id="papers-title">论文成果</h2>
          <p>
            聚焦非厄米传感、高阶奇异点与无线传感系统，保留 DOI、主题标签与中文标题说明。
          </p>
        </div>

        <div class="toolbar reveal" aria-label="论文筛选">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input data-search type="search" placeholder="检索标题、年份、标签" />
          </label>
          <div class="segmented" data-filter-group aria-label="主题">
            <button type="button" class="is-active" data-filter="all">全部</button>
            <button type="button" data-filter="first-author">第一作者</button>
            <button type="button" data-filter="non-hermitian">非厄米</button>
            <button type="button" data-filter="higher-order">高阶 EP</button>
            <button type="button" data-filter="quantum">量子传感</button>
          </div>
        </div>

        <div class="resource-grid" data-paper-grid></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Quantum Sensing Archive · 2026</p>
      <a href="./index.html#top">返回主页</a>
    </footer>

    <noscript>
      <p class="noscript">此页面需要启用 JavaScript 来渲染论文列表。</p>
    </noscript>
    <script src="./script.js"></script>
  </body>
</html>
