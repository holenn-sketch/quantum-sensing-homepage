<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="非厄米、奇异点和量子传感相关开放 PDF 论文的历史推荐归档。"
    />
    <title>Paper History · Quantum Sensing Archive</title>
    <link rel="icon" href="./favicon.svg?v=2" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page-history">
    <header class="site-header" data-header>
      <a class="brand" href="./index.html#top" aria-label="返回首页">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Q Sense Archive</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="./papers.html">论文成果</a>
        <a href="./data.html">数据资源</a>
        <a class="is-current" href="./related.html">相关论文</a>
        <a href="./flow.html">研究脉络</a>
      </nav>
      <button class="icon-button" type="button" data-theme-toggle aria-label="切换明暗外观">
        <span aria-hidden="true">◐</span>
      </button>
    </header>

    <main id="top">
      <section class="hero subpage-hero" aria-labelledby="history-hero-title">
        <canvas class="field-canvas" data-field-canvas aria-hidden="true"></canvas>
        <div class="hero-content">
          <p class="eyebrow">Archived Open Papers</p>
          <h1 id="history-hero-title">Paper History</h1>
          <div class="hero-actions" aria-label="页面入口">
            <a class="text-link text-link-strong" href="#history">查看历史论文</a>
            <a class="text-link" href="./related.html#related">返回近月论文</a>
            <a class="text-link" href="./flow.html">研究脉络</a>
          </div>
        </div>
        <div class="hero-strip" aria-label="历史论文概览">
          <div>
            <span>Archive</span>
            <small>deduplicated</small>
          </div>
          <div>
            <span>PDF</span>
            <small>available</small>
          </div>
          <div>
            <span>DOI</span>
            <small>lookup</small>
          </div>
        </div>
      </section>

      <section class="section section-quiet" id="history" aria-labelledby="history-title">
        <div class="section-head reveal">
          <p class="eyebrow">Previous Recommendations</p>
          <div class="section-title-row">
            <h2 id="history-title">历史论文</h2>
            <a class="section-inline-link" href="./related.html#related">近月相关论文</a>
          </div>
          <p>
            已推荐过的开放 PDF 论文会移到这里；近月推荐会自动排除这些 DOI 与标题，避免重复展示。
          </p>
        </div>

        <div class="latest-paper-grid history-paper-grid reveal" data-history-paper-grid></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Quantum Sensing Archive · 2026</p>
      <a href="./related.html#related">返回近月论文</a>
    </footer>

    <noscript>
      <p class="noscript">此页面需要启用 JavaScript 来渲染历史论文。</p>
    </noscript>
    <script src="./script.js"></script>
  </body>
</html>
